imports:
    - { resource: parameters.yml }
    - { resource: security.yml }
    - { resource: services.yml }
#    - { resource: "@DondrekielWebBundle/Resources/config/services.yml" }

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices/configuration.html#application-related-configuration
parameters:
    locale: en

framework:
    #esi: ~
    #translator: { fallbacks: ['%locale%'] }
    secret: '%secret%'
    router:
        resource: '%kernel.project_dir%/app/config/routing.yml'
        strict_requirements: ~
    form: ~
    csrf_protection: ~
    validation: { enable_annotations: true }
    serializer: { enable_annotations: true }
    templating:
        engines: ['twig']
    default_locale: '%locale%'
    trusted_hosts: ~
    session:
        handler_id: session.handler.pdo
        cookie_lifetime: 31536000
        lifetime:        31536000
    fragments: ~
    http_method_override: true
    assets: ~
    php_errors:
        log: true

# Twig Configuration
twig:
    debug: '%kernel.debug%'
    strict_variables: '%kernel.debug%'
    globals:
        app_hostname: "%app_hostname%"
        wss_enabled: "%wss_enabled%"
        wss_port: "%wss_port%"
    paths:
        '%kernel.root_dir%/../src/DondrekielAdminBundle/Resources/views/': DondrekielAdminBundle
    globals:
        avanzu_adminlte_close_alert: true # default is false
        admin_skin: skin-red

# Doctrine Configuration
doctrine:
    dbal:
        driver: pdo_mysql
        host: '%database_host%'
        port: '%database_port%'
        dbname: '%database_name%'
        user: '%database_user%'
        password: '%database_password%'
        charset: UTF8
        # if using pdo_sqlite as your database driver:
        #   1. add the path in parameters.yml
        #     e.g. database_path: '%kernel.project_dir%/var/data/data.sqlite'
        #   2. Uncomment database_path in parameters.yml.dist
        #   3. Uncomment next line:
        #path: '%database_path%'

    orm:
        auto_generate_proxy_classes: '%kernel.debug%'
        naming_strategy: doctrine.orm.naming_strategy.underscore
        auto_mapping: true

# Swiftmailer Configuration
swiftmailer:
    transport: '%mailer_transport%'
    host: '%mailer_host%'
    username: '%mailer_user%'
    password: '%mailer_password%'
    spool: { type: memory }


assetic:
    debug:          "%kernel.debug%"
    use_controller: false
    bundles:        [ 'DondrekielAppBundle' ]
#    bundles:        [ 'DondrekielAppBundle', 'OhGoogleMapFormTypeBundle' ]

    filters:
        cssrewrite: ~
    assets:
        bootstrap_js:
            inputs:
                - '%kernel.root_dir%/../vendor/twitter/bootstrap/dist/js/bootstrap.js'
                - '@DondrekielAppBundle/Resources/public/js/dondrekiel.js'
        bootstrap_css:
            inputs:
                - '%kernel.root_dir%/../vendor/twitter/bootstrap/dist/css/bootstrap.css'
                - '@DondrekielAppBundle/Resources/public/css/dondrekiel.css'

        jquery:
            inputs:
                - '%kernel.root_dir%/../vendor/components/jquery/jquery.js'
                - '%kernel.root_dir%/../vendor/twitter/bootstrap/dist/js/bootstrap.js'
                - '@DondrekielAppBundle/Resources/public/js/dondrekiel.js'

fos_rest:
    view:
        formats:
            rss: true
            xml: false
        templating_formats:
            html: true
        force_redirects:
            html: true
        failed_validation: HTTP_BAD_REQUEST
        default_engine: twig
        view_response_listener: true

gos_web_socket:
    server:
        port: 8888
        host: "%app_hostname%"
        router:
            resources:
                - '@DondrekielAppBundle/Resources/config/rpc/routing.yml'
    client:
        firewall: main #secured_area #can be an array of firewalls
        session_handler: '@session.handler.pdo'
        storage:
#            driver: '@gos_web_socket.client_storage.predis.driver'
#            decorator: '@gos_web_socket.client_storage.doctrine.decorator'
#            ttl: 28800 #(optionally) time to live if you use redis driver
#            prefix: client #(optionally) prefix if you use redis driver, create key "client:1" instead key "1"

fos_user:
    db_driver: orm
    firewall_name: main
    user_class: DondrekielAppBundle\Entity\Team
    from_email:
        address:        "info@dondrekiel.de"
        sender_name:    "Dondrekiel"

doctrine_phpcr:
   # configure the PHPCR session
   session:
       backend: "%phpcr_backend%"
       workspace: "%phpcr_workspace%"
       username: "%phpcr_user%"
       password: "%phpcr_pass%"
   # enable the ODM layer
   odm:
       auto_mapping: true
       auto_generate_proxy_classes: "%kernel.debug%"

cmf_routing:
    chain:
        routers_by_id:
            cmf_routing.dynamic_router: 200
            router.default: 100
    dynamic:
        enabled: true
        persistence:
            phpcr: true

cmf_routing_auto:
    persistence:
        phpcr:
            enabled: true
